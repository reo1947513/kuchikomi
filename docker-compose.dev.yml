version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: kuchikomi-dev
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:/app/prisma/dev.db
      - JWT_SECRET=dev-secret-key
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - NEXT_PUBLIC_APP_NAME=ComiSta
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped
